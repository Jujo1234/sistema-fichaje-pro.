<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Fichaje Profesional</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-in { background: #28a745; color: white; }
        .btn-out { background: #dc3545; color: white; }
        
        button:disabled {
            background-color: #cccccc !important;
            color: #666666 !important;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #seccionFichaje, #seccionJefe { display: none; } /* Escondemos las secciones nuevas al principio */
        .reloj { font-size: 24px; font-weight: bold; color: #333; margin: 15px 0; }

        .historial-container { margin-top: 20px; text-align: left; border-top: 1px solid #eee; padding-top: 10px; }
        .historial-lista { list-style: none; padding: 0; font-size: 13px; max-height: 150px; overflow-y: auto; }
        .historial-item { padding: 5px 0; border-bottom: 1px solid #f9f9f9; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="seccionLogin" class="card">
        <h2>Acceso al Sistema</h2>
        <input type="text" id="idEmpleado" placeholder="ID / DNI">
        <input type="password" id="passEmpleado" placeholder="Contraseña">
        <button class="btn-primary" onclick="validarAcceso()">Entrar al Panel</button>
        <p id="errorLogin" style="color: red;"></p>
    </div>

    <div id="seccionFichaje" class="card">
        <h2 id="saludo">Hola</h2>
        <div class="reloj" id="relojDigital">00:00:00</div>
        
        <label>Fecha del fichaje:</label>
        <input type="date" id="fechaFichaje">
        <label>Hora del fichaje:</label>
        <input type="time" id="horaFichaje">
        
        <button id="btnEntrada" class="btn-in" onclick="fichar('ENTRADA')">Confirmar ENTRADA</button>
        <button id="btnSalida" class="btn-out" onclick="fichar('SALIDA')">Confirmar SALIDA</button>
        
        <p id="mensajeFichaje" style="margin-top: 15px; font-weight: bold;"></p>

        <div class="historial-container">
            <strong style="color: #666;">Actividad reciente:</strong>
            <ul id="listaFichajes" class="historial-lista"></ul>
        </div>

        <button onclick="location.reload()" style="background:none; color: gray; font-size: 11px; margin-top: 10px;">Cerrar Sesión</button>
    </div>

    <div id="seccionJefe" class="card">
        <h2 style="color: #007bff;">Panel de Control</h2>
        <p>Bienvenido, <strong>Jefe de Planta</strong>.</p>
        <p style="font-size: 14px; color: #666;">Desde aquí puedes supervisar los fichajes de toda la empresa.</p>
        
        <button class="btn-primary" onclick="alert('Generando informe global...')">Ver Fichajes de Empleados</button>
        <button onclick="location.reload()" style="background:#666; color: white; margin-top: 20px;">Cerrar Sesión Jefe</button>
    </div>

    <script>
    // Crea una caja vacia para guardar el dni del empleado una vez que sepamos quien es
        let empleadoValidado = "";

    // Reloj en tiempo real
    // setInterval(() => { ... }, 1000);: Inicia un cronometro que repite lo que hay dentro cada 1000 milisegundos(1 Segundo)
        setInterval(() => {
        	// Crea un objeto con la fecha y hora exacta de este preciso instante
            const ahora = new Date();
        	// Busca en el html el elemnto con ID relojDigital y le escribe la hora(ej: "10:05:30")
            const rd = document.getElementById('relojDigital');
            if(rd) rd.innerText = ahora.toLocaleTimeString();

        	// Lo que esta dentro del parentesis de if pregunta si esta vacio el cuadro de la fecha, si es que si ejecuta lo siguiente
            if(document.getElementById('fechaFichaje') && !document.getElementById('fechaFichaje').value){
            	// Esta linea coge coge la fecha completa, la corta solo parav dejar "AAAA-MM-DD" y la pone automaticamente en el calendario web
                document.getElementById('fechaFichaje').value = ahora.toISOString().split('T')[0];
                // Esta linea hace lo mismo con la hora, cortandola para que solo aparezcan horas en minutos(ej: "10.05")
            	document.getElementById('horaFichaje').value = ahora.toTimeString().split(' ')[0].substring(0,5);
            }
        }, 1000);

    // Define una funcion que recibe cual fue el ultimo movimiento del empleado
        function actualizarBotones(ultimoTipo) {
    	// Guarda el boton de Entrada en una variable
            const btnIn = document.getElementById('btnEntrada');
    	// Guarda el boton de salida en una variable
            const btnOut = document.getElementById('btnSalida');
            
            if(!btnIn || !btnOut) return;

    	// Si el empleado ya entro...
            if (ultimoTipo === 'ENTRADA') {
            	// Bloquea el boton de entrada(Se pone en gris)
                btnIn.disabled = true;
            	// Activa el boton de salida
                btnOut.disabled = false;
            	// Si el ultimo fue Salida(o no hay ninguno), hace lo contrario: Activa la entrada y bloquea la salida
            } else {
                btnIn.disabled = false;
                btnOut.disabled = true;
            }
        }

        // Nueva función para cargar la lista desde la API
        // Define una funcion asincrona(Que espera respuestas de internet) para traer la lista de fichajes
        async function cargarHistorial() {
            try {
            	// Llama a tu servidor java en railway pidiendo los fichajes de ese DNI especifico
                const response = await fetch('/api/fichajes/historial/' + empleadoValidado);
                // Si el servidor responde que esta todo bien
            	if (response.ok) {
            		// Convierte la respuesta en una lista de objetos que JavaScrpt entiende
                    const fichajes = await response.json();
            		// Busca el lugar donde se dibujara la lista(un <ul> en el HTML)
                    const lista = document.getElementById('listaFichajes');
            		// Borra lo que hubiera antes para no repetir datos
                    lista.innerHTML = ""; 

                    // Mostramos los últimos 5 fichajes (invertimos el array para ver lo más nuevo arriba)
                    fichajes.reverse().slice(0, 5).forEach(f => {
                    	// Crea un nuevo punto de lista de la nada
                        const item = document.createElement('li');
                    	// Le pone una clase CSS para que se vea bonito
                        item.className = "historial-item";
                    	// Si es de entrada pone un punto verde, si no, uno rojo
                        const icon = f.tipo === 'ENTRADA' ? '🟢' : '🔴';
                    	// Formatea la fecha de la base de datos para que solo se vean horas y minutos
                        const horaCorta = new Date(f.fechaHora).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        // Mete el icono, el tipo y la hora dentro del punto de lista
                        item.innerHTML = `<span>${icon} ${f.tipo}</span> <span style="color: #888;">${horaCorta}</span>`;
                        // Pega ese nuevo punto en la lista de la pantalla
                        lista.appendChild(item);
                    });
                }
            } catch (e) { console.error("Error cargando historial", e); }
        }

        async function validarAcceso() {
        	// Lee el DNI escrito
            const id = document.getElementById('idEmpleado').value;
        	// Lee la contraseña escrita
            const pass = document.getElementById('passEmpleado').value;

        	// Envia una peticion POST al servidor Java con el DNI y la contraseña en un paquete JSON
            const response = await fetch('/api/fichajes/validar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ empleadoId: id, password: pass })
            });

        	// Si el login es correcto
            if (response.ok) {
                const data = await response.json();
                empleadoValidado = id;

                // Esconde el formulario de login para todos
                document.getElementById('seccionLogin').style.display = 'none';

                // LÓGICA DE DECISIÓN: ¿Es jefe o empleado?
                if (data.rol === 'jefe') {
                    // Muestra la pantalla especial de JEFE
                    document.getElementById('seccionJefe').style.display = 'block';
                } else {
                    // Muestra la pantalla con los bloques de fichar para el EMPLEADO
                    document.getElementById('saludo').innerText = "Hola, " + data.nombre;
                    document.getElementById('seccionFichaje').style.display = 'block';
                    // Mira si el empleado ya estaba dentro o fuera para activar el boton correcto
                    actualizarBotones(data.ultimoTipo);
                    // Llama a la funcion anterior para mostrar los ultimos fichajes
                    cargarHistorial(); 
                }
            } else {
                document.getElementById('errorLogin').innerText = "Usuario o contraseña incorrectos";
            }
        }

        // Funcion que se activa al darle a "Entrada" o "Salida"
        async function fichar(tipo) {
        	// Lee lo que pone en el cuadro de fecha
            const fecha = document.getElementById('fechaFichaje').value;
        	// Lee lo que pone en el cuadro de hora
            const hora = document.getElementById('horaFichaje').value;
            
            const response = await fetch('/api/fichajes/confirmar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                // Envía el paquete al servidor Java
                body: JSON.stringify({ 
                    empleadoId: empleadoValidado, 
                    tipo: tipo,
                    fechaHoraManual: fecha + "T" + hora + ":00" 
                })
            });

            if (response.ok) {
                const res = await response.text();
                document.getElementById('mensajeFichaje').innerText = res;
                // Pone el texto verde si entra o rojo si sale
                document.getElementById('mensajeFichaje').style.color = (tipo === 'ENTRADA') ? "green" : "red";
                
                // Bloquea el boton que acabas de pulsar
                actualizarBotones(tipo); 
                cargarHistorial(); // Actualizamos la lista tras el nuevo fichaje
            } else {
                document.getElementById('mensajeFichaje').innerText = "Error al guardar el fichaje";
            }
        }
    </script>
</body>
</html>
