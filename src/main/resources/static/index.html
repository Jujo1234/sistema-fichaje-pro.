<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Fichaje Profesional</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 450px; text-align: center; margin: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-in { background: #28a745; color: white; }
        .btn-out { background: #dc3545; color: white; }
        .btn-excel { background: #1d6f42; color: white; display: none; }
        .btn-manage { background: #6f42c1; color: white; } /* Color púrpura para gestión */
        
        button:disabled { background-color: #cccccc !important; cursor: not-allowed; opacity: 0.6; }
        #seccionFichaje, #seccionJefe, #listaGlobalContainer, #listaEmpleadosContainer { display: none; }
        .reloj { font-size: 24px; font-weight: bold; color: #333; margin: 15px 0; }

        .tabla-fichajes { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 12px; }
        .tabla-fichajes th, .tabla-fichajes td { border: 1px solid #eee; padding: 8px; text-align: left; }
        .tabla-fichajes th { background-color: #f8f9fa; }
        .form-admin { margin-top: 25px; padding-top: 20px; border-top: 2px solid #f0f2f5; text-align: left; }
    </style>
</head>
<body>

    <div id="seccionLogin" class="card">
        <h2>Acceso al Sistema</h2>
        <input type="text" id="idEmpleado" placeholder="ID / DNI">
        <input type="password" id="passEmpleado" placeholder="Contraseña">
        <button class="btn-primary" onclick="validarAcceso()">Entrar al Panel</button>
        <p id="errorLogin" style="color: red; font-weight: bold; margin-top: 10px;"></p>
    </div>

    <div id="seccionFichaje" class="card">
        <h2 id="saludo">Hola</h2>
        <div class="reloj" id="relojDigital">00:00:00</div>
        <label>Fecha y Hora:</label>
        <input type="date" id="fechaFichaje">
        <input type="time" id="horaFichaje">
        <button id="btnEntrada" class="btn-in" onclick="fichar('ENTRADA')">Confirmar ENTRADA</button>
        <button id="btnSalida" class="btn-out" onclick="fichar('SALIDA')">Confirmar SALIDA</button>
        <p id="mensajeFichaje" style="margin-top: 15px; font-weight: bold;"></p>
        <div class="historial-container">
            <ul id="listaFichajes" style="list-style:none; padding:0; text-align:left; font-size:13px;"></ul>
        </div>
        <button onclick="location.reload()" style="background:none; color: gray; font-size: 11px;">Cerrar Sesión</button>
    </div>

    <div id="seccionJefe" class="card" style="width: 700px;">
        <h2>Panel de Administración</h2>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn-primary" onclick="verFichajesGlobales()">Ver Fichajes</button>
            <button class="btn-manage" onclick="verListaEmpleados()">Gestionar Personal</button>
            <button id="btnExcel" class="btn-excel" onclick="exportarExcel()">Excel</button>
        </div>

        <div id="listaGlobalContainer">
            <h3 style="color: #007bff; margin-top: 20px;">Historial de Movimientos</h3>
            <table class="tabla-fichajes" id="tablaParaExportar">
                <thead><tr><th>DNI</th><th>Nombre</th><th>Acción</th><th>Fecha/Hora</th></tr></thead>
                <tbody id="tablaGlobalBody"></tbody>
            </table>
        </div>

        <div id="listaEmpleadosContainer">
            <h3 style="color: #6f42c1; margin-top: 20px;">Plantilla de Trabajadores</h3>
            <table class="tabla-fichajes">
                <thead><tr><th>DNI</th><th>Nombre</th><th>Rol</th><th>Acción</th></tr></thead>
                <tbody id="tablaEmpleadosBody"></tbody>
            </table>
            
            <div class="form-admin">
                <h3>Alta de Nuevo Empleado</h3>
                <input type="text" id="nuevoDni" placeholder="DNI">
                <input type="text" id="nuevoNombre" placeholder="Nombre">
                <input type="password" id="nuevoPass" placeholder="Clave">
                <select id="nuevoRol"><option value="empleado">Empleado</option><option value="jefe">Jefe</option></select>
                <button class="btn-in" onclick="registrarNuevo()">Añadir a Plantilla</button>
            </div>
        </div>

        <button onclick="location.reload()" style="background:#666; color: white; margin-top: 30px;">Cerrar Sesión Jefe</button>
    </div>

    <script>
        let empleadoValidado = "";

        setInterval(() => {
            const ahora = new Date();
            if(document.getElementById('relojDigital')) document.getElementById('relojDigital').innerText = ahora.toLocaleTimeString();
            if(document.getElementById('fechaFichaje') && !document.getElementById('fechaFichaje').value){
                document.getElementById('fechaFichaje').value = ahora.toISOString().split('T')[0];
                document.getElementById('horaFichaje').value = ahora.toTimeString().split(' ')[0].substring(0,5);
            }
        }, 1000);

        async function validarAcceso() {
            const id = document.getElementById('idEmpleado').value;
            const pass = document.getElementById('passEmpleado').value;
            const response = await fetch('/api/fichajes/validar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ empleadoId: id, password: pass })
            });

            if (response.ok) {
                const data = await response.json();
                empleadoValidado = id;
                document.getElementById('seccionLogin').style.display = 'none';
                if (data.rol.toLowerCase() === 'jefe') {
                    document.getElementById('seccionJefe').style.display = 'block';
                } else {
                    document.getElementById('saludo').innerText = "Hola, " + data.nombre;
                    document.getElementById('seccionFichaje').style.display = 'block';
                    actualizarBotones(data.ultimoTipo);
                    cargarHistorial();
                }
            } else {
                document.getElementById('errorLogin').innerText = "Usuario o contraseña incorrectos";
            }
        }

        async function verFichajesGlobales() {
            document.getElementById('listaEmpleadosContainer').style.display = 'none';
            const res = await fetch('/api/fichajes/todos');
            if (res.ok) {
                const data = await res.json();
                const body = document.getElementById('tablaGlobalBody');
                body.innerHTML = ""; 
                data.reverse().forEach(f => {
                    body.innerHTML += `<tr><td>${f.empleadoId}</td><td>${f.nombreEmpleado}</td><td style="color:${f.tipo==='ENTRADA'?'green':'red'}">${f.tipo}</td><td>${new Date(f.fechaHora).toLocaleString()}</td></tr>`;
                });
                document.getElementById('listaGlobalContainer').style.display = 'block';
                document.getElementById('btnExcel').style.display = 'block';
            }
        }

        async function verListaEmpleados() {
            document.getElementById('listaGlobalContainer').style.display = 'none';
            document.getElementById('btnExcel').style.display = 'none';
            const res = await fetch('/api/fichajes/admin/lista-trabajadores');
            if (res.ok) {
                const data = await res.json();
                const body = document.getElementById('tablaEmpleadosBody');
                body.innerHTML = ""; 
                data.forEach(e => {
                    body.innerHTML += `<tr><td>${e.dni}</td><td><strong>${e.nombre}</strong></td><td>${e.rol}</td><td><button onclick="eliminarEmpleado('${e.dni}')" style="background:none; color:red; width:auto; padding:0;">🗑️ Eliminar</button></td></tr>`;
                });
                document.getElementById('listaEmpleadosContainer').style.display = 'block';
            }
        }

        async function eliminarEmpleado(id) {
            if(confirm("¿Estás seguro de que quieres eliminar a " + id + " de la empresa?")) {
                await fetch('/api/fichajes/admin/eliminar-trabajador/' + id, { method: 'DELETE' });
                verListaEmpleados();
            }
        }

        async function registrarNuevo() {
            await fetch('/api/fichajes/admin/registrar-trabajador', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ dni: document.getElementById('nuevoDni').value, nombre: document.getElementById('nuevoNombre').value, password: document.getElementById('nuevoPass').value, rol: document.getElementById('nuevoRol').value })
            });
            alert("Empleado añadido");
            verListaEmpleados();
        }

        function exportarExcel() {
            const html = '<meta charset="UTF-8">' + document.getElementById("tablaParaExportar").outerHTML;
            const url = 'data:application/vnd.ms-excel,' + encodeURIComponent(html);
            const link = document.createElement("a");
            link.href = url;
            link.download = "Historial_Fichajes.xls";
            link.click();
        }

        async function fichar(tipo) {
            const response = await fetch('/api/fichajes/confirmar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ empleadoId: empleadoValidado, tipo: tipo, fechaHoraManual: document.getElementById('fechaFichaje').value + "T" + document.getElementById('horaFichaje').value + ":00" })
            });
            if (response.ok) {
                document.getElementById('mensajeFichaje').innerText = "¡" + tipo + " guardada!";
                document.getElementById('mensajeFichaje').style.color = (tipo === 'ENTRADA') ? "green" : "red";
                actualizarBotones(tipo);
                cargarHistorial();
            }
        }

        function actualizarBotones(tipo) {
            document.getElementById('btnEntrada').disabled = (tipo === 'ENTRADA');
            document.getElementById('btnSalida').disabled = (tipo !== 'ENTRADA');
        }

        async function cargarHistorial() {
            const res = await fetch('/api/fichajes/historial/' + empleadoValidado);
            if (res.ok) {
                const data = await res.json();
                const lista = document.getElementById('listaFichajes');
                lista.innerHTML = ""; 
                data.reverse().slice(0, 5).forEach(f => {
                    lista.innerHTML += `<li>${f.tipo === 'ENTRADA' ? '🟢' : '🔴'} ${f.tipo} - ${new Date(f.fechaHora).toLocaleTimeString()}</li>`;
                });
            }
        }
    </script>
</body>
</html>
