<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Fichaje Profesional</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 450px; text-align: center; margin: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-in { background: #28a745; color: white; }
        .btn-out { background: #dc3545; color: white; }
        .btn-excel { background: #1d6f42; color: white; display: none; }
        
        button:disabled { background-color: #cccccc !important; cursor: not-allowed; opacity: 0.6; }
        #seccionFichaje, #seccionJefe, #listaGlobalContainer { display: none; }
        .reloj { font-size: 24px; font-weight: bold; color: #333; margin: 15px 0; }

        .tabla-fichajes { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 13px; }
        .tabla-fichajes th, .tabla-fichajes td { border: 1px solid #eee; padding: 10px; text-align: left; }
        .tabla-fichajes th { background-color: #f8f9fa; color: #333; }

        .historial-container { margin-top: 20px; text-align: left; border-top: 1px solid #eee; padding-top: 10px; }
        .historial-lista { list-style: none; padding: 0; font-size: 13px; max-height: 150px; overflow-y: auto; }
        .historial-item { padding: 5px 0; border-bottom: 1px solid #f9f9f9; display: flex; justify-content: space-between; }
        .flex-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .form-admin { margin-top: 30px; padding-top: 20px; border-top: 2px solid #f0f2f5; text-align: left; }
    </style>
</head>
<body>

    <div id="seccionLogin" class="card">
        <h2>Acceso al Sistema</h2>
        <input type="text" id="idEmpleado" placeholder="ID / DNI">
        <input type="password" id="passEmpleado" placeholder="Contraseña">
        <button class="btn-primary" onclick="validarAcceso()">Entrar al Panel</button>
        <p id="errorLogin" style="color: red;"></p>
    </div>

    <div id="seccionFichaje" class="card">
        <h2 id="saludo">Hola</h2>
        <div class="reloj" id="relojDigital">00:00:00</div>
        <label>Fecha y Hora:</label>
        <input type="date" id="fechaFichaje">
        <input type="time" id="horaFichaje">
        <button id="btnEntrada" class="btn-in" onclick="fichar('ENTRADA')">Confirmar ENTRADA</button>
        <button id="btnSalida" class="btn-out" onclick="fichar('SALIDA')">Confirmar SALIDA</button>
        <div class="historial-container">
            <ul id="listaFichajes" class="historial-lista"></ul>
        </div>
        <button onclick="location.reload()" style="background:none; color: gray; font-size: 11px;">Cerrar Sesión</button>
    </div>

    <div id="seccionJefe" class="card" style="width: 650px;">
        <h2 style="color: #007bff;">Panel de Control</h2>
        <p>Bienvenido, <strong>Jefe de Planta</strong>.</p>
        
        <div class="flex-buttons">
            <button class="btn-primary" onclick="verFichajesGlobales()">Ver Fichajes de Empleados</button>
            <button id="btnExcel" class="btn-excel" onclick="exportarExcel()">Descargar Excel</button>
        </div>

        <div id="listaGlobalContainer">
            <table class="tabla-fichajes" id="tablaParaExportar">
                <thead>
                    <tr>
                        <th>DNI</th>
                        <th>Nombre</th>
                        <th>Acción</th>
                        <th>Fecha y Hora</th>
                        <th>Borrar</th>
                    </tr>
                </thead>
                <tbody id="tablaGlobalBody"></tbody>
            </table>
        </div>

        <div class="form-admin">
            <h3 style="color: #333; margin-bottom: 5px;">Alta de Nuevo Empleado</h3>
            <p style="font-size: 12px; color: #666;">Crea nuevos accesos para el personal aquí.</p>
            <input type="text" id="nuevoDni" placeholder="DNI / ID">
            <input type="text" id="nuevoNombre" placeholder="Nombre completo">
            <input type="password" id="nuevoPass" placeholder="Contraseña">
            <select id="nuevoRol">
                <option value="empleado">Rol: Empleado</option>
                <option value="jefe">Rol: Jefe</option>
            </select>
            <button class="btn-in" onclick="registrarNuevo()">Registrar en la Base de Datos</button>
        </div>

        <button onclick="location.reload()" style="background:#666; color: white; margin-top: 20px;">Cerrar Sesión Jefe</button>
    </div>

    <script>
        let empleadoValidado = "";

        setInterval(() => {
            const ahora = new Date();
            const rd = document.getElementById('relojDigital');
            if(rd) rd.innerText = ahora.toLocaleTimeString();
            if(document.getElementById('fechaFichaje') && !document.getElementById('fechaFichaje').value){
                document.getElementById('fechaFichaje').value = ahora.toISOString().split('T')[0];
                document.getElementById('horaFichaje').value = ahora.toTimeString().split(' ')[0].substring(0,5);
            }
        }, 1000);

        async function validarAcceso() {
            const id = document.getElementById('idEmpleado').value;
            const pass = document.getElementById('passEmpleado').value;
            const response = await fetch('/api/fichajes/validar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ empleadoId: id, password: pass })
            });

            if (response.ok) {
                const data = await response.json();
                empleadoValidado = id;
                document.getElementById('seccionLogin').style.display = 'none';
                if (data.rol && data.rol.toLowerCase() === 'jefe') {
                    document.getElementById('seccionJefe').style.display = 'block';
                } else {
                    document.getElementById('saludo').innerText = "Hola, " + data.nombre;
                    document.getElementById('seccionFichaje').style.display = 'block';
                }
            }
        }

        async function verFichajesGlobales() {
            const response = await fetch('/api/fichajes/todos');
            if (response.ok) {
                const fichajes = await response.json();
                const body = document.getElementById('tablaGlobalBody');
                body.innerHTML = ""; 
                fichajes.reverse().forEach(f => {
                    body.innerHTML += `<tr>
                        <td>${f.empleadoId}</td>
                        <td><strong>${f.nombreEmpleado}</strong></td>
                        <td style="color: ${f.tipo === 'ENTRADA' ? 'green' : 'red'}">${f.tipo}</td>
                        <td>${new Date(f.fechaHora).toLocaleString()}</td>
                        <td><button onclick="eliminarEmpleado('${f.empleadoId}')" style="background:none; color:red; cursor:pointer; width:auto; padding:0;">🗑️</button></td>
                    </tr>`;
                });
                document.getElementById('listaGlobalContainer').style.display = 'block';
                document.getElementById('btnExcel').style.display = 'block';
            }
        }

        async function registrarNuevo() {
            const dni = document.getElementById('nuevoDni').value;
            const nombre = document.getElementById('nuevoNombre').value;
            const pass = document.getElementById('nuevoPass').value;
            const rol = document.getElementById('nuevoRol').value;

            if(!dni || !nombre || !pass) return alert("Rellena todos los campos");

            const response = await fetch('/api/fichajes/admin/registrar-trabajador', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ dni: dni, nombre: nombre, password: pass, rol: rol })
            });

            if (response.ok) {
                alert("¡Empleado registrado con éxito!");
                location.reload();
            }
        }

        async function eliminarEmpleado(id) {
            if(!confirm("¿Seguro que quieres eliminar a " + id + "?")) return;
            const response = await fetch('/api/fichajes/admin/eliminar-trabajador/' + id, { method: 'DELETE' });
            if (response.ok) {
                alert("Empleado eliminado.");
                verFichajesGlobales();
            }
        }

        function exportarExcel() {
            const tabla = document.getElementById("tablaParaExportar");
            const meta = '<meta http-equiv="content-type" content="application/vnd.ms-excel; charset=UTF-8">';
            const html = meta + tabla.outerHTML;
            const blob = new Blob([html], { type: "application/vnd.ms-excel" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = "Reporte_Fichajes.xls";
            link.click();
        }

        async function fichar(tipo) {
            const fecha = document.getElementById('fechaFichaje').value;
            const hora = document.getElementById('horaFichaje').value;
            await fetch('/api/fichajes/confirmar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    empleadoId: empleadoValidado, 
                    tipo: tipo,
                    fechaHoraManual: fecha + "T" + hora + ":00" 
                })
            });
            alert("Fichaje de " + tipo + " guardado.");
        }
    </script>
</body>
</html>
